name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm build
          # Check that the template didn't change
          if ! git diff --quiet; then
            echo "❌ The generated template (template.tpl) that was committed is different from the generated template. Please run pnpm build and commit the changes."
            exit 1
          fi

      - name: Lint metadata.yaml
        id: lint-metadata
        run: |
          npx yaml-lint metadata.yaml

      - name: Lint and Tests
        run: |
          pnpm lint
          pnpm test
